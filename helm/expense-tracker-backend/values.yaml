replicaCount: 1

nameOverride: ""
fullnameOverride: ""

image:
  repository: abhijeetka/ep-tracker
  pullPolicy: IfNotPresent
  tag: "1.0.0"

imagePullSecrets: []

podAnnotations: {}
podLabels: {}

service:
  type: LoadBalancer
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: expense-tracker.local
      paths:
        - path: /ep-tracker
          pathType: Prefix
  tls: []

resources: {}

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}

