apiVersion: v1
kind: Service
metadata:
  name: {{ include "expense-tracker-frontend.fullname" . }}
  labels:
    {{- include "expense-tracker-frontend.labels" . | nindent 4 }}
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: arn:aws:acm:us-east-1:781950061287:certificate/46935349-8d0c-44fb-9995-4993931f537b
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "expense-tracker-frontend.selectorLabels" . | nindent 4 }}
